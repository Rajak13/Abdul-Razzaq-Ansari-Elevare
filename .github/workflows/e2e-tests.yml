name: End-to-End Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: elevare_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          frontend/package-lock.json
          backend/package-lock.json

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: summarization-service/requirements.txt

    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Install Python dependencies
      working-directory: ./summarization-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps

    - name: Run database migrations
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5433/elevare_test
      run: |
        cd backend
        npm run migrate

    - name: Start backend service
      working-directory: ./backend
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://test_user:test_password@localhost:5433/elevare_test
        JWT_SECRET: test_jwt_secret_key_for_testing_only
        PORT: 3001
      run: |
        npm run build
        npm start &
        sleep 10

    - name: Start summarization service
      working-directory: ./summarization-service
      env:
        ENVIRONMENT: test
        MODEL_NAME: google/pegasus-xsum
        MAX_INPUT_LENGTH: 1000
        CACHE_SIZE: 10
      run: |
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8001 &
        sleep 30

    - name: Start frontend service
      working-directory: ./frontend
      env:
        NODE_ENV: test
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_SUMMARIZATION_SERVICE_URL: http://localhost:8001
      run: |
        npm run build
        npm start &
        sleep 15

    - name: Wait for services to be ready
      run: |
        timeout 60 bash -c 'until curl -f http://localhost:3001/health; do sleep 1; done'
        timeout 120 bash -c 'until curl -f http://localhost:8001/health; do sleep 2; done'
        timeout 60 bash -c 'until curl -f http://localhost:3000; do sleep 1; done'

    - name: Run backend unit tests
      working-directory: ./backend
      run: npm test

    - name: Run summarization service tests
      working-directory: ./summarization-service
      run: python -m pytest -v

    - name: Run frontend unit tests
      working-directory: ./frontend
      run: npm run test

    - name: Run end-to-end tests
      working-directory: ./frontend
      run: npm run test:e2e

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          backend/coverage/
          frontend/coverage/
          frontend/playwright-report/
          frontend/test-results/
        retention-days: 7

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 7