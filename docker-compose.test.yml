version: '3.8'

services:
  # Test Database
  test-db:
    image: postgres:15
    environment:
      POSTGRES_DB: elevare_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d elevare_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://test_user:test_password@test-db:5432/elevare_test
      JWT_SECRET: test_jwt_secret_key_for_testing_only
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      test-db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run test

  # Summarization Service
  summarization-test:
    build:
      context: ./summarization-service
      dockerfile: Dockerfile.test
    environment:
      ENVIRONMENT: test
      MODEL_NAME: google/pegasus-xsum
      MAX_INPUT_LENGTH: 1000  # Smaller for faster testing
      CACHE_SIZE: 10
    ports:
      - "8001:8001"
    volumes:
      - ./summarization-service:/app
    command: python -m pytest -v

  # Frontend Application
  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    environment:
      NODE_ENV: test
      NEXT_PUBLIC_API_URL: http://backend-test:3001
      NEXT_PUBLIC_SUMMARIZATION_SERVICE_URL: http://summarization-test:8001
    ports:
      - "3000:3000"
    depends_on:
      - backend-test
      - summarization-test
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run test

  # End-to-End Test Runner
  e2e-tests:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    environment:
      NODE_ENV: test
      PLAYWRIGHT_BASE_URL: http://frontend-test:3000
    depends_on:
      - frontend-test
      - backend-test
      - summarization-test
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run test:e2e
    profiles:
      - e2e

networks:
  default:
    name: elevare-test-network